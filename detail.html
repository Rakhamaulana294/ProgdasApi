<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Produk – ThanksinsomniaStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --bg: #f7f5f2; --surface: #ffffff; --ink: #1a1714; --ink-muted: #6b6560; --accent: #c8a96e; --border: #e8e4de; --radius: 16px; }
      body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
      header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
      nav { max-width: 1280px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
      .logo { font-family: "DM Serif Display", serif; font-size: 1.25rem; color: var(--ink); text-decoration: none; }
      .logo span { color: var(--accent); }
      .btn-back { display: flex; align-items: center; gap: 8px; color: var(--ink-muted); text-decoration: none; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 50px; border: 1.5px solid var(--border); background: var(--surface); transition: all 0.2s; }
      .btn-back:hover { border-color: var(--ink); color: var(--ink); }
      .cart-icon-btn { position: relative; cursor: pointer; color: var(--ink); padding: 8px; text-decoration: none; }
      .cart-badge { position: absolute; top: 0; right: 0; background: var(--ink); color: white; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 50px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
      .detail-container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
      .product-gallery { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; display: flex; align-items: center; justify-content: center; aspect-ratio: 1; }
      .product-gallery img { max-width: 100%; object-fit: contain; mix-blend-mode: multiply; }
      .product-title { font-family: "DM Serif Display", serif; font-size: 2.8rem; margin-bottom: 12px; }
      .product-price { font-family: "DM Serif Display", serif; font-size: 1.8rem; margin-bottom: 24px; }
      .btn-add-cart { background: var(--ink); color: white; border: none; padding: 16px 32px; font-weight: 600; border-radius: 50px; cursor: pointer; width: 100%; }
      #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: white; padding: 12px 24px; border-radius: 50px; transition: transform 0.3s; z-index: 9999; }
      #toast.show { transform: translateX(-50%) translateY(0); }
      @media (max-width: 768px) { .detail-container { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div id="toast">Produk ditambahkan ke keranjang!</div>
    <header>
      <nav>
        <a href="product.html" class="logo">Thanksinsomnia<span>.</span></a>
        <div class="nav-actions">
          <a href="product.html" class="btn-back">← Kembali</a>
          <a href="cart.html" class="cart-icon-btn"><span class="cart-badge" id="cart-count">0</span></a>
        </div>
      </nav>
    </header>

    <main class="detail-container" id="detail-container">
      <p>Memuat detail produk...</p>
    </main>

    <script>
      "use strict";
      const SUPABASE_URL = 'https://gorjhwkrjggilwjhvwpx.supabase.co/rest/v1/dataproduct';
      const SUPABASE_ANON_KEY = 'sb_publishable_F-m8mebvMFXS-k607AegIg_pUq04f7b';

      const productId = new URLSearchParams(window.location.search).get("id");

      async function loadProduct() {
        const container = document.getElementById("detail-container");
        try {
          const res = await fetch(`${SUPABASE_URL}?id=eq.${productId}`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
          });
          const data = await res.json();
          const p = data[0];

          if (!p) throw new Error("Produk tidak ditemukan");

          container.innerHTML = `
            <div class="product-gallery"><img src="${p.image}" alt="${p.name}"></div>
            <div class="product-info">
              <h1 class="product-title">${p.name}</h1>
              <div class="product-price">Rp ${Number(p.price).toLocaleString('id-ID')}</div>
              <p style="margin-bottom:20px">${p.description || 'Produk eksklusif.'}</p>
              <button class="btn-add-cart" onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.image}')">Tambah ke Keranjang</button>
            </div>
          `;
        } catch (e) {
          container.innerHTML = `<p style="color:red">Gagal memuat produk.</p>`;
        }
      }

      function addToCart(id, name, price, image) {
        let cart = JSON.parse(localStorage.getItem("keranjang") || "[]");
        cart.push({ id, name, price, image, qty: 1 });
        localStorage.setItem("keranjang", JSON.stringify(cart));
        document.getElementById("toast").classList.add("show");
        setTimeout(() => document.getElementById("toast").classList.remove("show"), 2000);
      }

      document.addEventListener("DOMContentLoaded", loadProduct);
    </script>
  </body>
</html>
