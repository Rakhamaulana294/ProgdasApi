<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Produk – ThanksinsomniaStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --ink: #1a1714;
      --ink-muted: #6b6560;
      --accent: #c8a96e;
      --accent-dark: #a8874a;
      --border: #e8e4de;
      --radius: 16px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

    /* ── NAVBAR ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    nav {
      max-width: 1280px; margin: 0 auto; padding: 0 24px;
      height: 64px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: var(--ink); text-decoration: none; }
    .logo span { color: var(--accent); }
    .btn-cart {
      display: flex; align-items: center; gap: 8px;
      background: var(--ink); color: white; border: none;
      padding: 10px 18px; border-radius: 50px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background 0.2s;
    }
    .btn-cart:hover { background: #2d2926; }
    .btn-cart svg { width: 16px; height: 16px; }
    .cart-badge {
      background: var(--accent); color: white; font-size: 11px; font-weight: 700;
      min-width: 20px; height: 20px; padding: 0 5px; border-radius: 50px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      max-width: 1280px; margin: 0 auto; padding: 20px 24px 0;
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--ink-muted);
    }
    .breadcrumb a { color: var(--ink-muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--ink); }
    .breadcrumb-sep { opacity: 0.4; }

    /* ── DETAIL LAYOUT ── */
    .detail-wrap {
      max-width: 1280px; margin: 0 auto;
      padding: 24px 24px 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    /* ── IMAGE PANEL ── */
    .img-panel {
      background: #f0ede8;
      border-radius: 24px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      position: sticky;
      top: 88px;
      overflow: hidden;
    }
    .img-panel img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      mix-blend-mode: multiply;
      transition: transform 0.4s ease;
    }
    .img-panel:hover img { transform: scale(1.04); }

    /* ── INFO PANEL ── */
    .info-panel { padding-top: 12px; }
    .info-cat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200,169,110,0.12);
      border: 1px solid rgba(200,169,110,0.35);
      color: var(--accent-dark);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 50px;
      margin-bottom: 20px;
    }
    .info-name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .info-rating {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .stars { color: var(--accent); font-size: 15px; letter-spacing: 2px; }
    .rating-val { font-size: 13px; font-weight: 600; color: var(--ink-muted); }
    .info-price {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--ink);
      margin-bottom: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .info-desc-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 10px;
    }
    .info-desc {
      font-size: 14px;
      line-height: 1.75;
      color: var(--ink-muted);
      margin-bottom: 40px;
    }

    /* ── STOCK ── */
    .stock-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 28px;
    }
    .stock-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #5cb85c;
      flex-shrink: 0;
    }
    .stock-dot.low { background: var(--accent); }
    .stock-dot.out { background: #e05252; }
    .stock-text { color: var(--ink-muted); font-weight: 500; }

    /* ── QTY + ADD BUTTON ── */
    .buy-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }
    .qty-ctrl {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      overflow: hidden;
      background: var(--surface);
    }
    .qty-ctrl button {
      border: none; background: none; cursor: pointer;
      width: 40px; height: 44px; font-size: 18px; font-weight: 300;
      color: var(--ink-muted); transition: background 0.15s;
    }
    .qty-ctrl button:hover { background: var(--bg); }
    .qty-ctrl span { min-width: 36px; text-align: center; font-size: 15px; font-weight: 600; }

    .btn-add-main {
      flex: 1;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 14px 24px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-add-main:hover { background: #2d2926; transform: translateY(-1px); }
    .btn-add-main:active { transform: translateY(0); }
    .btn-add-main.added { background: var(--accent); }

    .btn-go-cart {
      width: 100%;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      padding: 13px 24px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-go-cart:hover { border-color: var(--ink); background: rgba(0,0,0,0.03); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink); color: white;
      font-size: 13px; font-weight: 500;
      padding: 12px 20px; border-radius: 50px; z-index: 9999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── LOADING / ERROR ── */
    .state-box {
      grid-column: 1 / -1; text-align: center;
      padding: 100px 20px; color: var(--ink-muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .detail-wrap { grid-template-columns: 1fr; gap: 24px; }
      .img-panel { position: relative; top: 0; aspect-ratio: 4/3; padding: 32px; }
      .buy-row { flex-direction: column; }
      .btn-add-main { width: 100%; }
    }
  </style>
</head>
<body>

  <div id="toast"></div>

  <header>
    <nav>
      <a href="index.html" class="logo">Thanksinsomnia<span>.</span></a>
      <a href="cart.html" class="btn-cart">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        Keranjang
        <span class="cart-badge" id="cart-count">0</span>
      </a>
    </nav>
  </header>

  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span class="breadcrumb-sep">›</span>
    <a href="index.html">Produk</a>
    <span class="breadcrumb-sep">›</span>
    <span id="bc-name">Detail</span>
  </div>

  <div class="detail-wrap" id="detail-wrap">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Memuat produk…</p>
    </div>
  </div>

  <script>
    'use strict';

    const SUPABASE_URL      = 'https://gorjhwkrjggilwjhvwpx.supabase.co/rest/v1/dataproduct';
    const SUPABASE_ANON_KEY = 'sb_publishable_F-m8mebvMFXS-k607AegIg_pUq04f7b';

    function fmt(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function safe(v) { const n = parseFloat(v); return isFinite(n) && n >= 0 ? n : 0; }
    function getCart() { try { return JSON.parse(localStorage.getItem('keranjang')) || []; } catch { return []; } }
    function saveCart(c) { localStorage.setItem('keranjang', JSON.stringify(c)); updateBadge(); }
    function updateBadge() {
      const total = getCart().reduce((s,i) => s + i.qty, 0);
      document.getElementById('cart-count').textContent = total;
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    let qty = 1;
    let currentProduct = null;

    function setQty(n) {
      qty = Math.max(1, n);
      document.getElementById('qty-val').textContent = qty;
    }

    function addToCart() {
      if (!currentProduct) return;
      const cart = getCart();
      const idx  = cart.findIndex(c => c.id == currentProduct.id);
      if (idx !== -1) { cart[idx].qty += qty; }
      else { cart.push({ id: currentProduct.id, name: currentProduct.name, price: safe(currentProduct.price), image: currentProduct.image || '', qty }); }
      saveCart(cart);
      showToast(`✓ ${qty}× ditambahkan ke keranjang`);
      const btn = document.getElementById('btn-add');
      if (btn) {
        btn.textContent = '✓ Ditambahkan!';
        btn.classList.add('added');
        setTimeout(() => { btn.textContent = 'Tambah ke Keranjang'; btn.classList.remove('added'); }, 1600);
      }
    }

    function renderDetail(item) {
      currentProduct = item;
      const price = safe(item.price);
      const name  = item.name || 'Produk Tanpa Nama';
      const cat   = item.category || '';
      const img   = item.image || '';
      const desc  = item.description || 'Tidak ada deskripsi untuk produk ini.';
      const rat   = item.rating;
      const stok  = item.stok;

      document.title = `${name} – ThanksinsomniaStore`;
      document.getElementById('bc-name').textContent = name;

      let stockHtml = '';
      if (stok !== undefined && stok !== null) {
        const s = Number(stok);
        if (s <= 0) stockHtml = `<div class="stock-row"><span class="stock-dot out"></span><span class="stock-text">Stok habis</span></div>`;
        else if (s <= 5) stockHtml = `<div class="stock-row"><span class="stock-dot low"></span><span class="stock-text">Sisa ${s} item – segera habis!</span></div>`;
        else stockHtml = `<div class="stock-row"><span class="stock-dot"></span><span class="stock-text">Tersedia (${s} item)</span></div>`;
      }

      let ratingHtml = '';
      if (rat) {
        const full = Math.round(Number(rat));
        const stars = '★'.repeat(full) + '☆'.repeat(Math.max(0, 5 - full));
        ratingHtml = `<div class="info-rating"><span class="stars">${stars}</span><span class="rating-val">${rat} / 5</span></div>`;
      }

      document.getElementById('detail-wrap').innerHTML = `
        <div class="img-panel">
          <img src="${esc(img)}" alt="${esc(name)}" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
        </div>
        <div class="info-panel">
          ${cat ? `<div class="info-cat">${esc(cat)}</div>` : ''}
          <h1 class="info-name">${esc(name)}</h1>
          ${ratingHtml}
          <div class="info-price">${fmt(price)}</div>
          ${stockHtml}
          <p class="info-desc-label">Deskripsi Produk</p>
          <p class="info-desc">${esc(desc)}</p>
          <div class="buy-row">
            <div class="qty-ctrl">
              <button onclick="setQty(qty - 1)" aria-label="Kurangi">−</button>
              <span id="qty-val">1</span>
              <button onclick="setQty(qty + 1)" aria-label="Tambah">+</button>
            </div>
            <button class="btn-add-main" id="btn-add" onclick="addToCart()">Tambah ke Keranjang</button>
          </div>
          <a href="cart.html" class="btn-go-cart">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            Lihat Keranjang
          </a>
        </div>`;
    }

    async function loadProduct() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('detail-wrap').innerHTML = `<div class="state-box"><p>Produk tidak ditemukan. <a href="index.html" style="color:var(--accent-dark)">Kembali ke toko</a></p></div>`;
        return;
      }
      try {
        const res = await fetch(`${SUPABASE_URL}?id=eq.${encodeURIComponent(id)}&select=*`, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Accept': 'application/json' }
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.length) throw new Error('Produk tidak ditemukan');
        renderDetail(data[0]);
      } catch (err) {
        document.getElementById('detail-wrap').innerHTML = `<div class="state-box"><p style="color:#e05252">${esc(err.message)}</p><br><a href="index.html" style="color:var(--accent-dark);font-weight:600">← Kembali ke toko</a></div>`;
      }
    }

    updateBadge();
    loadProduct();
  </script>
</body>
</html>
